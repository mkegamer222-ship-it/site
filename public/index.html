<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #0f0f13;
        --surface: #18181f;
        --surface2: #22222c;
        --border: #2a2a38;
        --accent: #7c6af7;
        --accent-glow: rgba(124, 106, 247, 0.18);
        --text: #e8e8f0;
        --muted: #6b6b82;
        --bubble-me: #7c6af7;
        --bubble-other: #22222c;
        --radius: 18px;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* ── Name screen ── */
      #name-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
        animation: fadeIn 0.4s ease;
      }

      #name-screen h1 {
        font-size: 2rem;
        font-weight: 600;
        letter-spacing: -0.03em;
      }

      #name-screen h1 span {
        color: var(--accent);
      }

      #name-screen p {
        color: var(--muted);
        font-size: 0.95rem;
      }

      .name-box {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 320px;
      }

      .name-box input {
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: 12px;
        padding: 14px 18px;
        color: var(--text);
        font-size: 1rem;
        font-family: inherit;
        outline: none;
        transition: border-color 0.2s;
      }

      .name-box input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }

      .name-box input::placeholder {
        color: var(--muted);
      }

      .btn-enter {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 12px;
        padding: 14px;
        font-size: 1rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.15s;
      }

      .btn-enter:hover {
        opacity: 0.88;
        transform: translateY(-1px);
      }

      .btn-enter:active {
        transform: translateY(0);
      }

      /* ── Chat screen ── */
      #chat-screen {
        display: none;
        flex-direction: column;
        width: 100%;
        max-width: 680px;
        height: 100dvh;
        max-height: 100dvh;
        background: var(--surface);
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
        animation: fadeIn 0.35s ease;
      }

      /* Header */
      .chat-header {
        padding: 18px 22px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--surface);
        flex-shrink: 0;
      }

      .chat-header-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .avatar-dot {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        font-size: 0.95rem;
        color: #fff;
        flex-shrink: 0;
      }

      .chat-header h2 {
        font-size: 1rem;
        font-weight: 600;
      }

      .chat-header .sub {
        font-size: 0.78rem;
        color: var(--muted);
        margin-top: 1px;
      }

      .online-pill {
        font-size: 0.75rem;
        color: var(--muted);
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 99px;
        padding: 4px 12px;
      }

      .online-pill strong {
        color: var(--text);
      }

      /* Messages */
      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        scroll-behavior: smooth;
      }

      #messages::-webkit-scrollbar {
        width: 4px;
      }

      #messages::-webkit-scrollbar-track {
        background: transparent;
      }

      #messages::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 99px;
      }

      /* System messages */
      .sys-msg {
        text-align: center;
        font-size: 0.75rem;
        color: var(--muted);
        padding: 6px 0;
        animation: fadeIn 0.3s ease;
      }

      /* Message rows */
      .msg-row {
        display: flex;
        flex-direction: column;
        max-width: 74%;
        animation: slideUp 0.22s ease;
      }

      .msg-row.me {
        align-self: flex-end;
        align-items: flex-end;
      }

      .msg-row.other {
        align-self: flex-start;
        align-items: flex-start;
      }

      .msg-name {
        font-size: 0.72rem;
        color: var(--muted);
        margin-bottom: 4px;
        padding: 0 6px;
      }

      .bubble {
        padding: 11px 16px;
        border-radius: var(--radius);
        font-size: 0.93rem;
        line-height: 1.5;
        word-break: break-word;
        position: relative;
      }

      .msg-row.me .bubble {
        background: var(--bubble-me);
        color: #fff;
        border-bottom-right-radius: 5px;
      }

      .msg-row.other .bubble {
        background: var(--bubble-other);
        color: var(--text);
        border-bottom-left-radius: 5px;
        border: 1px solid var(--border);
      }

      .bubble-time {
        font-size: 0.68rem;
        opacity: 0.6;
        margin-top: 5px;
        padding: 0 4px;
        color: var(--muted);
      }

      .msg-row.me .bubble-time {
        color: rgba(255, 255, 255, 0.7);
      }

      /* Typing indicator */
      #typing-bar {
        height: 22px;
        padding: 0 22px;
        font-size: 0.78rem;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
      }

      .typing-dots {
        display: flex;
        gap: 3px;
      }

      .typing-dots span {
        width: 4px;
        height: 4px;
        background: var(--muted);
        border-radius: 50%;
        animation: bounce 1.1s infinite;
      }

      .typing-dots span:nth-child(2) {
        animation-delay: 0.18s;
      }

      .typing-dots span:nth-child(3) {
        animation-delay: 0.36s;
      }

      /* Input area */
      .chat-input {
        padding: 14px 16px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 10px;
        align-items: flex-end;
        flex-shrink: 0;
        background: var(--surface);
      }

      #msg-input {
        flex: 1;
        background: var(--surface2);
        border: 1.5px solid var(--border);
        border-radius: 14px;
        padding: 12px 16px;
        color: var(--text);
        font-size: 0.95rem;
        font-family: inherit;
        outline: none;
        resize: none;
        max-height: 120px;
        line-height: 1.45;
        transition: border-color 0.2s;
      }

      #msg-input:focus {
        border-color: var(--accent);
      }

      #msg-input::placeholder {
        color: var(--muted);
      }

      #send-btn {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: var(--accent);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: opacity 0.2s, transform 0.15s;
      }

      #send-btn:hover {
        opacity: 0.85;
        transform: scale(1.05);
      }

      #send-btn:active {
        transform: scale(0.97);
      }

      #send-btn svg {
        width: 20px;
        height: 20px;
        fill: #fff;
        margin-left: 2px;
      }

      /* Animations */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes bounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
        }
        30% {
          transform: translateY(-4px);
        }
      }

      @media (max-width: 700px) {
        #chat-screen {
          border: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- Name screen -->
    <div id="name-screen">
      <div>
        <h1>Bem-vindo ao <span>Chat</span></h1>
        <p style="text-align:center;margin-top:8px">Como quer ser chamado?</p>
      </div>
      <div class="name-box">
        <input
          id="name-input"
          type="text"
          placeholder="Seu nome..."
          maxlength="24"
          autocomplete="off"
        />
        <button class="btn-enter" onclick="enterChat()">Entrar no chat</button>
      </div>
    </div>

    <!-- Chat screen -->
    <div id="chat-screen">
      <div class="chat-header">
        <div class="chat-header-left">
          <div class="avatar-dot" id="my-avatar">?</div>
          <div>
            <h2 id="my-name-label">...</h2>
            <div class="sub">Você está conectado</div>
          </div>
        </div>
        <div class="online-pill">
          <strong id="online-count">1</strong> online
        </div>
      </div>

      <div id="messages"></div>

      <div id="typing-bar"></div>

      <div class="chat-input">
        <textarea
          id="msg-input"
          placeholder="Digite uma mensagem..."
          rows="1"
        ></textarea>
        <button id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
          </svg>
        </button>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      let myName = "";
      let typingTimeout;

      // ── Enter chat ──
      function enterChat() {
        const input = document.getElementById("name-input");
        const name = input.value.trim();
        if (!name) {
          input.focus();
          input.style.borderColor = "#f87171";
          setTimeout(() => (input.style.borderColor = ""), 700);
          return;
        }
        myName = name;

        document.getElementById("name-screen").style.display = "none";
        const chatScreen = document.getElementById("chat-screen");
        chatScreen.style.display = "flex";

        document.getElementById("my-avatar").textContent = name[0].toUpperCase();
        document.getElementById("my-name-label").textContent = name;

        socket.emit("join", name);
        document.getElementById("msg-input").focus();
      }

      document.getElementById("name-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") enterChat();
      });

      // ── Send message ──
      function sendMessage() {
        const input = document.getElementById("msg-input");
        const text = input.value.trim();
        if (!text) return;

        socket.emit("message", { name: myName, text });
        socket.emit("stop_typing");
        input.value = "";
        input.style.height = "auto";
        input.focus();
        clearTimeout(typingTimeout);
      }

      // ── Typing detection ──
      document.getElementById("msg-input").addEventListener("input", function () {
        autoResize(this);
        socket.emit("typing", myName);
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => socket.emit("stop_typing"), 1500);
      });

      document.getElementById("msg-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      function autoResize(el) {
        el.style.height = "auto";
        el.style.height = Math.min(el.scrollHeight, 120) + "px";
      }

      // ── Socket events ──
      socket.on("message", ({ name, text, timestamp }) => {
        appendMessage({ name, text, timestamp, isMe: name === myName });
      });

      socket.on("user_joined", ({ name, count }) => {
        appendSystem(`${name} entrou na sala`);
        document.getElementById("online-count").textContent = count;
      });

      socket.on("user_left", ({ name, count }) => {
        appendSystem(`${name} saiu da sala`);
        document.getElementById("online-count").textContent = count;
      });

      socket.on("online_count", (count) => {
        document.getElementById("online-count").textContent = count;
      });

      socket.on("typing", (name) => {
        if (name === myName) return;
        const bar = document.getElementById("typing-bar");
        bar.innerHTML = `
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
          <span>${name} está digitando</span>`;
      });

      socket.on("stop_typing", () => {
        document.getElementById("typing-bar").innerHTML = "";
      });

      // ── Helpers ──
      function appendMessage({ name, text, timestamp, isMe }) {
        const msgs = document.getElementById("messages");

        const row = document.createElement("div");
        row.className = `msg-row ${isMe ? "me" : "other"}`;
        row.innerHTML = `
          ${!isMe ? `<div class="msg-name">${esc(name)}</div>` : ""}
          <div class="bubble">${esc(text)}</div>
          <div class="bubble-time">${timestamp}</div>`;

        msgs.appendChild(row);
        msgs.scrollTop = msgs.scrollHeight;
      }

      function appendSystem(text) {
        const msgs = document.getElementById("messages");
        const el = document.createElement("div");
        el.className = "sys-msg";
        el.textContent = text;
        msgs.appendChild(el);
        msgs.scrollTop = msgs.scrollHeight;
      }

      function esc(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
    </script>
  </body>
</html>
